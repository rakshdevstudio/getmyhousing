spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/getmyhousing;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}


# Auto-update DDL mode
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT token configuration
jwt.token.validaity=2592000
jwt.secret=change-this-jwt-secret-in-production

# Disable Spring Security Auto-Configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Allow circular references
spring.main.allow-circular-references=true

# Maximum allowed size for file uploads
multipart.maxFileSize=150000000

#base url
baseUrl=http://my-url.com


